<svg width="680" viewBox="0 0 680 1240" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <title>LAMP pipeline flowchart</title>
  <desc>Flowchart showing the LAMP (LTR Annotation and Mining Pipeline) stages from RepeatModeler2 input through GFF and summary outputs</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 14px; font-weight: 600; }
      .sub   { font-size: 12px; font-weight: 400; }
      .label { font-size: 11px; font-weight: 400; }
      .box-gray   { fill: #F1EFE8; stroke: #888780; }
      .box-purple { fill: #EEEDFE; stroke: #7F77DD; }
      .box-teal   { fill: #E1F5EE; stroke: #1D9E75; }
      .box-coral  { fill: #FAECE7; stroke: #D85A30; }
      .box-amber  { fill: #FAEEDA; stroke: #BA7517; }
      .box-dashed { fill: none;    stroke: #B4B2A9; stroke-dasharray: 5 3; }
      .t-gray-title   { fill: #444441; }
      .t-gray-sub     { fill: #5F5E5A; }
      .t-purple-title { fill: #3C3489; }
      .t-purple-sub   { fill: #534AB7; }
      .t-teal-title   { fill: #085041; }
      .t-teal-sub     { fill: #0F6E56; }
      .t-coral-title  { fill: #712B13; }
      .t-coral-sub    { fill: #993C1D; }
      .t-amber-title  { fill: #633806; }
      .t-amber-sub    { fill: #854F0B; }
      line.arr { stroke: #888780; fill: none; }
    </style>
  </defs>

  <!-- RepeatModeler2 dashed container -->
  <rect x="60" y="20" width="560" height="100" rx="10" stroke-width="0.8" class="box-dashed"/>
  <text x="340" y="41" text-anchor="middle" class="label t-gray-sub">RepeatModeler2 output</text>

  <rect x="80" y="52" width="230" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text x="195" y="71" text-anchor="middle" class="title t-gray-title">Consensus FASTA</text>
  <text x="195" y="89" text-anchor="middle" class="sub t-gray-sub">*-families.fa</text>

  <rect x="330" y="52" width="270" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text x="465" y="71" text-anchor="middle" class="title t-gray-title">Stockholm alignment file</text>
  <text x="465" y="89" text-anchor="middle" class="sub t-gray-sub">*-families.stk · all families concatenated</text>

  <!-- Genome input -->
  <rect x="200" y="146" width="280" height="52" rx="8" stroke-width="0.5" class="box-gray"/>
  <text x="340" y="165" text-anchor="middle" class="title t-gray-title">Genome FASTA</text>
  <text x="340" y="183" text-anchor="middle" class="sub t-gray-sub">Any assembly · any chromosome naming</text>

  <!-- Input connectors -->
  <line x1="195" y1="104" x2="270" y2="232" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <line x1="465" y1="104" x2="380" y2="232" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <line x1="340" y1="198" x2="340" y2="232" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Stage 1 -->
  <rect x="110" y="232" width="460" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="340" y="253" text-anchor="middle" class="title t-purple-title">Stage 1: LTR–INT family classification</text>
  <text x="340" y="272" text-anchor="middle" class="sub t-purple-sub">Parse Stockholm · match LTR+INT pairs within 1 kb · classify all families</text>

  <!-- Branch -->
  <line x1="270" y1="288" x2="195" y2="322" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <line x1="410" y1="288" x2="485" y2="322" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <rect x="50" y="322" width="285" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text x="192" y="341" text-anchor="middle" class="title t-teal-title">Matched families</text>
  <text x="192" y="359" text-anchor="middle" class="sub t-teal-sub">LTR + INT pair found within 1 kb</text>

  <rect x="345" y="322" width="285" height="52" rx="8" stroke-width="0.5" class="box-coral"/>
  <text x="487" y="341" text-anchor="middle" class="title t-coral-title">Unmatched families</text>
  <text x="487" y="359" text-anchor="middle" class="sub t-coral-sub">LTR-only or INT-only</text>

  <!-- Merge -->
  <line x1="192" y1="374" x2="280" y2="408" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <line x1="487" y1="374" x2="400" y2="408" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Stage 2 -->
  <rect x="110" y="408" width="460" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="340" y="429" text-anchor="middle" class="title t-purple-title">Stage 2: Genome-wide BLAST</text>
  <text x="340" y="448" text-anchor="middle" class="sub t-purple-sub">BLASTn vs genome · e-value ≤1e-5 · ≥60% query coverage · per category</text>

  <line x1="340" y1="464" x2="340" y2="494" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Stage 3 -->
  <rect x="110" y="494" width="460" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="340" y="515" text-anchor="middle" class="title t-purple-title">Stage 3: Deduplication</text>
  <text x="340" y="534" text-anchor="middle" class="sub t-purple-sub">Remove overlapping hits · keep highest identity per locus</text>

  <line x1="340" y1="550" x2="340" y2="580" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Stage 4 -->
  <rect x="110" y="580" width="460" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="340" y="601" text-anchor="middle" class="title t-purple-title">Stage 4: Flanking region extraction</text>
  <text x="340" y="620" text-anchor="middle" class="sub t-purple-sub">±14 kb window (configurable) · bedtools getfasta · coords in FASTA header</text>

  <line x1="340" y1="636" x2="340" y2="666" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Stage 5 -->
  <rect x="110" y="666" width="460" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="340" y="687" text-anchor="middle" class="title t-purple-title">Stage 5: CDD domain search</text>
  <text x="340" y="706" text-anchor="middle" class="sub t-purple-sub">rpstblastn · parallel per family · e-value ≤1e-3</text>

  <line x1="340" y1="722" x2="340" y2="752" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Stage 6 -->
  <rect x="110" y="752" width="460" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="340" y="773" text-anchor="middle" class="title t-purple-title">Stage 6: Domain name resolution</text>
  <text x="340" y="792" text-anchor="middle" class="sub t-purple-sub">NCBI CDD esummary API · one batched request for all accessions</text>

  <line x1="340" y1="808" x2="340" y2="838" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Stage 7 -->
  <rect x="110" y="838" width="460" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
  <text x="340" y="859" text-anchor="middle" class="title t-purple-title">Stage 7: GFF3 and CSV writing</text>
  <text x="340" y="878" text-anchor="middle" class="sub t-purple-sub">Human-readable domain names · original BLAST coords embedded</text>

  <!-- Output connectors -->
  <line x1="230" y1="894" x2="143" y2="926" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <line x1="340" y1="894" x2="340" y2="926" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <line x1="450" y1="894" x2="537" y2="926" stroke-width="1" marker-end="url(#arrow)" class="arr"/>

  <!-- Output boxes -->
  <rect x="36"  y="926" width="213" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text x="142" y="945" text-anchor="middle" class="title t-teal-title">GFF3 per family</text>
  <text x="142" y="963" text-anchor="middle" class="sub t-teal-sub">Domain · accession · e-value</text>

  <rect x="233" y="926" width="214" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text x="340" y="945" text-anchor="middle" class="title t-teal-title">CDD summary CSV</text>
  <text x="340" y="963" text-anchor="middle" class="sub t-teal-sub">All hits across families</text>

  <rect x="431" y="926" width="213" height="52" rx="8" stroke-width="0.5" class="box-teal"/>
  <text x="537" y="945" text-anchor="middle" class="title t-teal-title">Family summary TSV</text>
  <text x="537" y="963" text-anchor="middle" class="sub t-teal-sub">Chr · coords · pident · strand</text>

  <!-- LTR element structure legend -->
  <rect x="60" y="1028" width="560" height="178" rx="8" stroke-width="0.5" class="box-dashed"/>
  <text x="340" y="1050" text-anchor="middle" class="title t-gray-title">Detectable LTR element structures</text>

  <!-- Row 1: full-length with ENV -->
  <text x="76" y="1084" class="label t-gray-sub">Full-length</text>
  <rect x="148" y="1070" width="54" height="28" rx="5" stroke-width="0.5" class="box-amber"/>
  <text x="175" y="1084" text-anchor="middle" class="label t-amber-title">LTR</text>
  <line x1="202" y1="1084" x2="214" y2="1084" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <rect x="214" y="1070" width="54" height="28" rx="5" stroke-width="0.5" class="box-coral"/>
  <text x="241" y="1084" text-anchor="middle" class="label t-coral-title">GAG</text>
  <line x1="268" y1="1084" x2="280" y2="1084" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <rect x="280" y="1070" width="54" height="28" rx="5" stroke-width="0.5" class="box-purple"/>
  <text x="307" y="1084" text-anchor="middle" class="label t-purple-title">POL</text>
  <line x1="334" y1="1084" x2="346" y2="1084" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <rect x="346" y="1070" width="54" height="28" rx="5" stroke-width="0.5" class="box-teal"/>
  <text x="373" y="1084" text-anchor="middle" class="label t-teal-title">ENV</text>
  <line x1="400" y1="1084" x2="412" y2="1084" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <rect x="412" y="1070" width="54" height="28" rx="5" stroke-width="0.5" class="box-amber"/>
  <text x="439" y="1084" text-anchor="middle" class="label t-amber-title">LTR</text>
  <text x="478" y="1084" class="label t-gray-sub">e.g. ERV</text>

  <!-- Row 2: no ENV -->
  <text x="76" y="1130" class="label t-gray-sub">No ENV</text>
  <rect x="148" y="1116" width="54" height="28" rx="5" stroke-width="0.5" class="box-amber"/>
  <text x="175" y="1130" text-anchor="middle" class="label t-amber-title">LTR</text>
  <line x1="202" y1="1130" x2="214" y2="1130" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <rect x="214" y="1116" width="54" height="28" rx="5" stroke-width="0.5" class="box-coral"/>
  <text x="241" y="1130" text-anchor="middle" class="label t-coral-title">GAG</text>
  <line x1="268" y1="1130" x2="280" y2="1130" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <rect x="280" y="1116" width="54" height="28" rx="5" stroke-width="0.5" class="box-purple"/>
  <text x="307" y="1130" text-anchor="middle" class="label t-purple-title">POL</text>
  <line x1="334" y1="1130" x2="412" y2="1130" stroke-width="1" marker-end="url(#arrow)" class="arr"/>
  <rect x="412" y="1116" width="54" height="28" rx="5" stroke-width="0.5" class="box-amber"/>
  <text x="439" y="1130" text-anchor="middle" class="label t-amber-title">LTR</text>
  <text x="478" y="1130" class="label t-gray-sub">e.g. copia/gypsy</text>

  <!-- Row 3: solo LTR -->
  <text x="76" y="1176" class="label t-gray-sub">Solo LTR</text>
  <rect x="148" y="1162" width="54" height="28" rx="5" stroke-width="0.5" class="box-amber"/>
  <text x="175" y="1176" text-anchor="middle" class="label t-amber-title">LTR</text>
  <text x="216" y="1176" class="label t-gray-sub">internal region deleted</text>
  <text x="478" y="1176" class="label t-gray-sub">ltr_unmatched category</text>
</svg>
